<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cataract Detection | AI-Powered Fundus Analysis</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f8fafc;
      --surface: #ffffff;
      --border: #e2e8f0;
      --text: #0f172a;
      --text-muted: #64748b;
      --primary: #0ea5e9;
      --primary-hover: #0284c7;
      --success: #10b981;
      --warning: #f59e0b;
      --error: #ef4444;
      --radius: 12px;
      --radius-lg: 16px;
      --shadow: 0 1px 3px rgba(0,0,0,.08);
      --shadow-lg: 0 10px 40px -10px rgba(0,0,0,.12);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'DM Sans', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.6;
    }

    .page {
      max-width: 560px;
      margin: 0 auto;
      padding: 2rem 1.25rem 3rem;
    }

    header {
      text-align: center;
      margin-bottom: 2rem;
    }
    header h1 {
      font-size: 1.75rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--text);
      margin-bottom: 0.35rem;
    }
    header p {
      font-size: 0.9375rem;
      color: var(--text-muted);
      font-weight: 500;
    }

    .card {
      background: var(--surface);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-lg);
      border: 1px solid var(--border);
      padding: 1.75rem;
      margin-bottom: 1.25rem;
    }

    .upload-zone {
      border: 2px dashed var(--border);
      border-radius: var(--radius);
      padding: 2rem;
      text-align: center;
      background: var(--bg);
      transition: border-color .2s, background .2s;
      cursor: pointer;
      position: relative;
    }
    .upload-zone:hover, .upload-zone.dragover {
      border-color: var(--primary);
      background: rgba(14, 165, 233, .04);
    }
    .upload-zone input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      width: 100%;
      height: 100%;
    }
    .upload-zone .icon {
      width: 48px;
      height: 48px;
      margin: 0 auto 0.75rem;
      background: linear-gradient(135deg, var(--primary), #38bdf8);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
    }
    .upload-zone .prompt {
      font-weight: 600;
      color: var(--text);
      margin-bottom: 0.25rem;
    }
    .upload-zone .hint {
      font-size: 0.8125rem;
      color: var(--text-muted);
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      width: 100%;
      padding: 0.875rem 1.25rem;
      font-family: inherit;
      font-size: 0.9375rem;
      font-weight: 600;
      color: #fff;
      background: linear-gradient(135deg, var(--primary), #38bdf8);
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      transition: transform .05s, box-shadow .2s;
      margin-top: 1rem;
    }
    .btn:hover { box-shadow: 0 4px 14px rgba(14, 165, 233, .4); }
    .btn:active { transform: scale(0.99); }
    .btn:disabled { opacity: 0.7; cursor: not-allowed; }

    .result-card { display: none; }
    .result-card.visible { display: block; }

    .result-header {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 1.25rem;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      padding: 0.35rem 0.75rem;
      border-radius: 999px;
      font-size: 0.875rem;
      font-weight: 600;
    }
    .badge.cataract { background: rgba(245, 158, 11, .15); color: #b45309; }
    .badge.non-cataract { background: rgba(16, 185, 129, .15); color: #047857; }
    .confidence-bar-wrap {
      flex: 1;
      height: 8px;
      background: var(--border);
      border-radius: 999px;
      overflow: hidden;
    }
    .confidence-bar {
      height: 100%;
      border-radius: 999px;
      transition: width .4s ease;
    }
    .confidence-bar.cataract { background: linear-gradient(90deg, var(--warning), #fbbf24); }
    .confidence-bar.non-cataract { background: linear-gradient(90deg, var(--success), #34d399); }
    .confidence-text {
      font-size: 0.8125rem;
      color: var(--text-muted);
      font-weight: 600;
      min-width: 3rem;
      text-align: right;
    }

    .gradcam-label {
      font-size: 0.8125rem;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 0.5rem;
    }
    .gradcam-wrap {
      border-radius: var(--radius);
      overflow: hidden;
      border: 1px solid var(--border);
      background: var(--bg);
    }
    #gradcam {
      display: block;
      width: 100%;
      height: auto;
      max-height: 360px;
      object-fit: contain;
    }

    .error-msg {
      font-size: 0.875rem;
      color: var(--error);
      background: rgba(239, 68, 68, .08);
      padding: 0.75rem 1rem;
      border-radius: var(--radius);
      margin-top: 0.5rem;
      display: none;
    }
    .error-msg.visible { display: block; }

    .loading {
      display: none;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      padding: 0.875rem;
      font-size: 0.9375rem;
      color: var(--text-muted);
      font-weight: 500;
    }
    .loading.visible { display: inline-flex; width: 100%; }
    .spinner {
      width: 20px;
      height: 20px;
      border: 2px solid var(--border);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .file-name {
      font-size: 0.8125rem;
      color: var(--text-muted);
      margin-top: 0.5rem;
      display: none;
    }
    .file-name.visible { display: block; }
  </style>
</head>
<body>
  <div class="page">
    <header>
      <h1>Cataract Detection</h1>
      <p>Upload a fundus image for AI-powered binary classification and Grad-CAM explainability</p>
    </header>

    <div class="card">
      <form id="form">
        <div class="upload-zone" id="uploadZone">
          <input type="file" id="image" name="image" accept="image/*" required>
          <div class="icon">&#128247;</div>
          <div class="prompt">Click or drag to upload</div>
          <div class="hint">JPG, PNG — fundus / retinal image</div>
        </div>
        <div class="file-name" id="fileName"></div>
        <button type="submit" class="btn" id="submitBtn">
          <span class="btn-text">Analyze image</span>
          <span class="loading" id="loading"><span class="spinner"></span> Analyzing…</span>
        </button>
      </form>
    </div>

    <div class="card result-card" id="result">
      <div class="result-header">
        <span class="badge" id="badge"></span>
        <div class="confidence-bar-wrap">
          <div class="confidence-bar" id="confidenceBar" style="width: 0%"></div>
        </div>
        <span class="confidence-text" id="confidence"></span>
      </div>
      <div class="gradcam-label">Grad-CAM overlay</div>
      <div class="gradcam-wrap">
        <img id="gradcam" alt="Grad-CAM heatmap" src="">
      </div>
    </div>

    <p class="error-msg" id="error"></p>
  </div>

  <script>
    const form = document.getElementById("form");
    const result = document.getElementById("result");
    const badge = document.getElementById("badge");
    const confidenceEl = document.getElementById("confidence");
    const confidenceBar = document.getElementById("confidenceBar");
    const gradcamEl = document.getElementById("gradcam");
    const errorEl = document.getElementById("error");
    const submitBtn = document.getElementById("submitBtn");
    const btnText = submitBtn.querySelector(".btn-text");
    const loading = document.getElementById("loading");
    const fileNameEl = document.getElementById("fileName");
    const uploadZone = document.getElementById("uploadZone");
    const fileInput = document.getElementById("image");

    function showError(msg) {
      errorEl.textContent = msg;
      errorEl.classList.add("visible");
    }
    function clearError() {
      errorEl.textContent = "";
      errorEl.classList.remove("visible");
    }

    fileInput.addEventListener("change", function() {
      const file = this.files[0];
      if (file) {
        fileNameEl.textContent = file.name;
        fileNameEl.classList.add("visible");
      } else {
        fileNameEl.textContent = "";
        fileNameEl.classList.remove("visible");
      }
    });

    uploadZone.addEventListener("dragover", (e) => { e.preventDefault(); uploadZone.classList.add("dragover"); });
    uploadZone.addEventListener("dragleave", () => uploadZone.classList.remove("dragover"));
    uploadZone.addEventListener("drop", (e) => {
      e.preventDefault();
      uploadZone.classList.remove("dragover");
      if (e.dataTransfer.files.length) {
        fileInput.files = e.dataTransfer.files;
        fileNameEl.textContent = e.dataTransfer.files[0].name;
        fileNameEl.classList.add("visible");
      }
    });

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      clearError();
      result.classList.remove("visible");
      const file = fileInput.files[0];
      if (!file) return;
      const fd = new FormData();
      fd.append("image", file);
      submitBtn.disabled = true;
      btnText.style.display = "none";
      loading.classList.add("visible");
      try {
        const r = await fetch("/predict", { method: "POST", body: fd });
        const data = await r.json();
        if (!r.ok) {
          showError(data.error || "Request failed");
          return;
        }
        const isCataract = data.label === "cataract";
        badge.textContent = data.label;
        badge.className = "badge " + (isCataract ? "cataract" : "non-cataract");
        const pct = (data.confidence * 100).toFixed(1);
        confidenceEl.textContent = pct + "%";
        confidenceBar.style.width = pct + "%";
        confidenceBar.className = "confidence-bar " + (isCataract ? "cataract" : "non-cataract");
        gradcamEl.src = "data:image/png;base64," + data.gradcam_b64;
        result.classList.add("visible");
      } catch (err) {
        showError(err.message || "Network error");
      } finally {
        submitBtn.disabled = false;
        btnText.style.display = "inline";
        loading.classList.remove("visible");
      }
    });
  </script>
</body>
</html>
